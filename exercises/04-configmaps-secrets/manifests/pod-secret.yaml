apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
  labels:
    exercise: "04"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
      volumeMounts:
        - name: db-creds
          mountPath: /etc/db-credentials
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  volumes:
    - name: db-creds
      secret:
        secretName: db-secret
