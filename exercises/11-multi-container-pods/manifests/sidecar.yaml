apiVersion: v1
kind: Pod
metadata:
  name: sidecar-demo
  labels:
    app: sidecar-demo
    exercise: "11"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "$(date) [INFO] Application heartbeat" >> /var/log/app.log
            sleep 5
          done
      volumeMounts:
        - name: logs
          mountPath: /var/log
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    - name: log-shipper
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Log shipper started, tailing application logs..."
          tail -f /var/log/app.log
      volumeMounts:
        - name: logs
          mountPath: /var/log
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
  volumes:
    - name: logs
      emptyDir: {}
