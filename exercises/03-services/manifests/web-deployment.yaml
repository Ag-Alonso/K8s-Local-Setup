apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
    exercise: "03"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: hashicorp/http-echo:1.0
          args:
            - "-text=Hello from $(HOSTNAME)"
            - "-listen=:80"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
