# Fixed: corrected the image tag from "nonexistent-tag" to "1.27"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  labels:
    app: broken
    exercise: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken
  template:
    metadata:
      labels:
        app: broken
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
