# Redis ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: guestbook
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: guestbook
data:
  redis.conf: |
    maxmemory 64mb
    maxmemory-policy allkeys-lru
    save 60 1
    dir /data
---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: guestbook
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: guestbook
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  storageClassName: standard
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: guestbook
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: guestbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: datastore
        app.kubernetes.io/part-of: guestbook
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "/etc/redis/redis.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/redis
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: redis-config
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: guestbook
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: guestbook
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
