# Deployment with all three probe types
apiVersion: apps/v1
kind: Deployment
metadata:
  name: full-probes
  labels:
    app: full-probes
    exercise: "09"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: full-probes
  template:
    metadata:
      labels:
        app: full-probes
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
