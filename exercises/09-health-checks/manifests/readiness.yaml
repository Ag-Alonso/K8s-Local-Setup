# This pod simulates a slow startup — readiness probe fails for 15s
apiVersion: v1
kind: Pod
metadata:
  name: readiness-test
  labels:
    app: readiness-test
    exercise: "09"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "App starting (not ready yet)..."
          sleep 15
          touch /tmp/ready
          echo "App is now ready!"
          sleep 600
      readinessProbe:
        exec:
          command: ["cat", "/tmp/ready"]
        initialDelaySeconds: 2
        periodSeconds: 3
        failureThreshold: 3
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
