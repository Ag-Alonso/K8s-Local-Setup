apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-probes
  labels:
    app: no-probes
    exercise: "09"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: no-probes
  template:
    metadata:
      labels:
        app: no-probes
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
