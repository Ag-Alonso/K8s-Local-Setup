# This pod creates a file on startup, then deletes it after 30s.
# The liveness probe checks for the file, so the container will be restarted.
apiVersion: v1
kind: Pod
metadata:
  name: liveness-test
  labels:
    app: liveness-test
    exercise: "09"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          touch /tmp/healthy
          echo "App started, healthy file created"
          sleep 30
          rm /tmp/healthy
          echo "Healthy file removed — liveness will fail"
          sleep 600
      livenessProbe:
        exec:
          command: ["cat", "/tmp/healthy"]
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
