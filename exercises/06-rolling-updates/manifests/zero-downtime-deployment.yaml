apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-zero-downtime
  labels:
    app: web-zero-downtime
    exercise: "06"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-zero-downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-zero-downtime
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
